<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DimMarEx — Скрипт Лидоруба</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0B0F1A;
  --bg-card: #111827;
  --bg-card-hover: #1a2236;
  --bg-surface: #0f1525;
  --border: #1e2a42;
  --border-active: #3b82f6;
  --text: #e2e8f0;
  --text-dim: #64748b;
  --text-muted: #475569;
  --accent: #3b82f6;
  --accent-glow: rgba(59,130,246,.15);
  --green: #22c55e;
  --green-bg: rgba(34,197,94,.08);
  --green-border: rgba(34,197,94,.25);
  --yellow: #f59e0b;
  --yellow-bg: rgba(245,158,11,.08);
  --yellow-border: rgba(245,158,11,.25);
  --red: #ef4444;
  --red-bg: rgba(239,68,68,.08);
  --red-border: rgba(239,68,68,.25);
  --radius: 12px;
  --radius-sm: 8px;
  --font: 'Manrope', sans-serif;
  --mono: 'JetBrains Mono', monospace;
}

* { margin:0; padding:0; box-sizing:border-box; }

html { scroll-behavior: smooth; }

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ─── PROGRESS BAR ─── */
.progress-bar-fixed {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: var(--bg-card);
  z-index: 1000;
}
.progress-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), #818cf8);
  transition: width .5s cubic-bezier(.4,0,.2,1);
  width: 0%;
  border-radius: 0 2px 2px 0;
  box-shadow: 0 0 12px rgba(59,130,246,.4);
}

/* ─── TOP NAV ─── */
.top-nav {
  position: fixed;
  top: 3px; left: 0; right: 0;
  background: rgba(11,15,26,.85);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  z-index: 900;
  padding: 0 24px;
  height: 56px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.top-nav-brand {
  display: flex;
  align-items: center;
  gap: 10px;
  font-weight: 700;
  font-size: 15px;
  letter-spacing: -.02em;
}
.top-nav-brand .dot {
  width: 8px; height: 8px;
  background: var(--accent);
  border-radius: 50%;
  box-shadow: 0 0 8px var(--accent);
  animation: pulse-dot 2s infinite;
}
@keyframes pulse-dot {
  0%,100% { opacity:1; }
  50% { opacity:.4; }
}
.step-dots {
  display: flex;
  gap: 6px;
  align-items: center;
}
.step-dot {
  width: 28px; height: 28px;
  border-radius: 50%;
  border: 2px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  font-weight: 700;
  color: var(--text-muted);
  cursor: pointer;
  transition: all .3s;
  font-family: var(--mono);
}
.step-dot.active {
  border-color: var(--accent);
  color: var(--accent);
  background: var(--accent-glow);
  box-shadow: 0 0 12px rgba(59,130,246,.25);
}
.step-dot.done {
  border-color: var(--green);
  color: var(--green);
  background: var(--green-bg);
}

/* ─── OBJECTIONS FLOATING BUTTON ─── */
.objections-fab {
  position: fixed;
  bottom: 28px;
  right: 28px;
  z-index: 800;
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 8px;
}
.fab-btn {
  width: 56px; height: 56px;
  border-radius: 50%;
  background: linear-gradient(135deg, #f59e0b, #f97316);
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 4px 24px rgba(245,158,11,.35);
  transition: all .3s;
  position: relative;
}
.fab-btn:hover {
  transform: scale(1.08);
  box-shadow: 0 6px 32px rgba(245,158,11,.5);
}
.fab-btn svg { width: 24px; height: 24px; fill: #fff; }
.fab-label {
  background: var(--bg-card);
  border: 1px solid var(--border);
  padding: 6px 12px;
  border-radius: 8px;
  font-size: 12px;
  color: var(--text-dim);
  font-weight: 600;
  letter-spacing: .02em;
  pointer-events: none;
  white-space: nowrap;
}

/* ─── OBJECTIONS MENU ─── */
.obj-menu {
  position: fixed;
  bottom: 96px;
  right: 28px;
  z-index: 810;
  display: none;
  flex-direction: column;
  gap: 6px;
  animation: slideUp .25s ease;
}
.obj-menu.open { display: flex; }
@keyframes slideUp {
  from { opacity:0; transform: translateY(12px); }
  to { opacity:1; transform: translateY(0); }
}
.obj-menu-item {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 10px 16px;
  font-size: 13px;
  font-weight: 600;
  color: var(--yellow);
  cursor: pointer;
  transition: all .2s;
  text-align: right;
  white-space: nowrap;
}
.obj-menu-item:hover {
  background: var(--bg-card-hover);
  border-color: var(--yellow-border);
  transform: translateX(-4px);
}

/* ─── MODAL ─── */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.7);
  backdrop-filter: blur(8px);
  z-index: 2000;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 24px;
  animation: fadeIn .2s;
}
.modal-overlay.open { display: flex; }
@keyframes fadeIn {
  from { opacity:0; }
  to { opacity:1; }
}
.modal {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 16px;
  max-width: 560px;
  width: 100%;
  padding: 32px;
  position: relative;
  animation: modalIn .3s cubic-bezier(.4,0,.2,1);
}
@keyframes modalIn {
  from { opacity:0; transform: scale(.95) translateY(10px); }
  to { opacity:1; transform: scale(1) translateY(0); }
}
.modal-close {
  position: absolute;
  top: 16px; right: 16px;
  width: 32px; height: 32px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: var(--bg-surface);
  color: var(--text-dim);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  transition: all .2s;
}
.modal-close:hover { border-color: var(--red); color: var(--red); }
.modal-tag {
  display: inline-block;
  background: var(--yellow-bg);
  border: 1px solid var(--yellow-border);
  color: var(--yellow);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: .05em;
  padding: 4px 10px;
  border-radius: 6px;
  margin-bottom: 12px;
  text-transform: uppercase;
}
.modal h3 {
  font-size: 18px;
  font-weight: 700;
  margin-bottom: 16px;
  color: var(--text);
}
.modal p {
  font-size: 14px;
  line-height: 1.7;
  color: var(--text-dim);
}
.modal .response-box {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-left: 3px solid var(--accent);
  border-radius: var(--radius-sm);
  padding: 16px;
  margin-top: 16px;
}
.modal .response-box p {
  color: var(--text);
  font-style: italic;
}

/* ─── MAIN LAYOUT ─── */
.main {
  max-width: 760px;
  margin: 0 auto;
  padding: 80px 20px 120px;
}

/* ─── STEP CARD ─── */
.step {
  display: none;
  animation: stepIn .4s ease;
}
.step.active { display: block; }
@keyframes stepIn {
  from { opacity:0; transform: translateY(16px); }
  to { opacity:1; transform: translateY(0); }
}

.step-header {
  margin-bottom: 28px;
}
.step-number {
  font-family: var(--mono);
  font-size: 12px;
  font-weight: 600;
  color: var(--accent);
  letter-spacing: .1em;
  margin-bottom: 6px;
  text-transform: uppercase;
}
.step-title {
  font-size: 26px;
  font-weight: 800;
  letter-spacing: -.03em;
  line-height: 1.2;
}

/* ─── SPEECH BUBBLE ─── */
.speech {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px 24px;
  margin-bottom: 16px;
  position: relative;
}
.speech::before {
  content: '';
  position: absolute;
  left: -1px; top: 0; bottom: 0;
  width: 3px;
  background: var(--accent);
  border-radius: 3px 0 0 3px;
}
.speech-label {
  font-size: 10px;
  font-weight: 700;
  color: var(--accent);
  letter-spacing: .1em;
  text-transform: uppercase;
  margin-bottom: 8px;
}
.speech p {
  font-size: 15px;
  line-height: 1.7;
  color: var(--text);
}

/* ─── NOTE BOX ─── */
.note {
  background: rgba(59,130,246,.05);
  border: 1px solid rgba(59,130,246,.15);
  border-radius: var(--radius-sm);
  padding: 14px 18px;
  margin-bottom: 16px;
  font-size: 13px;
  color: var(--text-dim);
  display: flex;
  gap: 10px;
  align-items: flex-start;
}
.note.warn {
  background: var(--yellow-bg);
  border-color: var(--yellow-border);
}
.note.warn .note-icon { color: var(--yellow); }
.note-icon {
  font-size: 16px;
  flex-shrink: 0;
  margin-top: 1px;
  color: var(--accent);
}

/* ─── OPTION CARDS ─── */
.options-grid {
  display: grid;
  gap: 12px;
  margin: 20px 0;
}
.options-grid.cols-3 { grid-template-columns: repeat(3, 1fr); }
.options-grid.cols-2 { grid-template-columns: repeat(2, 1fr); }

.option-card {
  background: var(--bg-card);
  border: 2px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  cursor: pointer;
  transition: all .25s;
  position: relative;
}
.option-card:hover { border-color: var(--text-muted); }
.option-card.selected.green  { border-color: var(--green);  background: var(--green-bg);  }
.option-card.selected.yellow { border-color: var(--yellow); background: var(--yellow-bg); }
.option-card.selected.red    { border-color: var(--red);    background: var(--red-bg);    }

.option-indicator {
  width: 10px; height: 10px;
  border-radius: 50%;
  margin-bottom: 10px;
}
.option-card.green  .option-indicator { background: var(--green); box-shadow: 0 0 8px rgba(34,197,94,.4);}
.option-card.yellow .option-indicator { background: var(--yellow); box-shadow: 0 0 8px rgba(245,158,11,.4);}
.option-card.red    .option-indicator { background: var(--red); box-shadow: 0 0 8px rgba(239,68,68,.4);}

.option-title {
  font-size: 13px;
  font-weight: 700;
  margin-bottom: 6px;
}
.option-card.green  .option-title { color: var(--green); }
.option-card.yellow .option-title { color: var(--yellow); }
.option-card.red    .option-title { color: var(--red); }

.option-desc {
  font-size: 12px;
  color: var(--text-muted);
  margin-bottom: 10px;
  line-height: 1.5;
}
.option-response {
  font-size: 12px;
  color: var(--text-dim);
  font-style: italic;
  border-top: 1px solid var(--border);
  padding-top: 8px;
  margin-top: 8px;
}
.option-card.selected .option-response { border-color: transparent; }

.selected-check {
  position: absolute;
  top: 12px; right: 12px;
  width: 22px; height: 22px;
  border-radius: 50%;
  display: none;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 800;
  color: #fff;
}
.option-card.selected .selected-check { display: flex; }
.option-card.selected.green  .selected-check { background: var(--green); }
.option-card.selected.yellow .selected-check { background: var(--yellow); }
.option-card.selected.red    .selected-check { background: var(--red); }

/* ─── TG INPUT ─── */
.tg-input-group {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  margin: 16px 0;
}
.tg-input-group label {
  display: block;
  font-size: 12px;
  font-weight: 700;
  color: var(--accent);
  letter-spacing: .05em;
  text-transform: uppercase;
  margin-bottom: 8px;
}
.tg-input {
  width: 100%;
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 12px 16px;
  color: var(--text);
  font-family: var(--mono);
  font-size: 14px;
  outline: none;
  transition: border-color .2s;
}
.tg-input:focus { border-color: var(--accent); }
.tg-input::placeholder { color: var(--text-muted); }

/* ─── NAV BUTTONS ─── */
.step-nav {
  display: flex;
  gap: 12px;
  margin-top: 32px;
  justify-content: flex-end;
}
.btn {
  padding: 12px 28px;
  border-radius: var(--radius-sm);
  font-family: var(--font);
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  transition: all .25s;
  border: none;
  letter-spacing: -.01em;
}
.btn-primary {
  background: var(--accent);
  color: #fff;
  box-shadow: 0 2px 12px rgba(59,130,246,.3);
}
.btn-primary:hover {
  background: #2563eb;
  box-shadow: 0 4px 20px rgba(59,130,246,.45);
  transform: translateY(-1px);
}
.btn-primary:disabled {
  opacity: .35;
  cursor: not-allowed;
  transform: none;
  box-shadow: none;
}
.btn-back {
  background: var(--bg-card);
  border: 1px solid var(--border);
  color: var(--text-dim);
}
.btn-back:hover { border-color: var(--text-muted); color: var(--text); }

/* ─── RESULT CARD ─── */
.result-card {
  text-align: center;
  padding: 48px 32px;
}
.result-icon {
  width: 80px; height: 80px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 36px;
  margin: 0 auto 24px;
}
.result-card.qualified .result-icon {
  background: var(--green-bg);
  border: 2px solid var(--green);
  box-shadow: 0 0 40px rgba(34,197,94,.2);
}
.result-card.not-qualified .result-icon {
  background: var(--red-bg);
  border: 2px solid var(--red);
  box-shadow: 0 0 40px rgba(239,68,68,.2);
}
.result-status {
  font-size: 13px;
  font-weight: 700;
  letter-spacing: .1em;
  text-transform: uppercase;
  margin-bottom: 8px;
}
.result-card.qualified .result-status { color: var(--green); }
.result-card.not-qualified .result-status { color: var(--red); }
.result-title {
  font-size: 28px;
  font-weight: 800;
  letter-spacing: -.03em;
  margin-bottom: 20px;
}
.result-criteria {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin: 28px 0;
  text-align: left;
  max-width: 400px;
  margin-left: auto;
  margin-right: auto;
}
.result-crit-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 16px;
  border-radius: var(--radius-sm);
  background: var(--bg-surface);
  border: 1px solid var(--border);
  font-size: 14px;
}
.result-crit-icon {
  width: 24px; height: 24px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  flex-shrink: 0;
  font-weight: 800;
  color: #fff;
}
.result-crit-icon.pass { background: var(--green); }
.result-crit-icon.warn { background: var(--yellow); }
.result-crit-icon.fail { background: var(--red); }

.result-speech {
  max-width: 500px;
  margin: 24px auto 0;
}
.result-actions {
  margin-top: 32px;
  display: flex;
  gap: 12px;
  justify-content: center;
}

/* ─── CHECKLIST ─── */
.checklist {
  margin-top: 28px;
  text-align: left;
  max-width: 480px;
  margin-left: auto;
  margin-right: auto;
}
.checklist-title {
  font-size: 13px;
  font-weight: 700;
  color: var(--accent);
  letter-spacing: .05em;
  text-transform: uppercase;
  margin-bottom: 12px;
}
.checklist-item {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 8px 0;
  font-size: 13px;
  color: var(--text-dim);
}
.checklist-item input[type="checkbox"] {
  appearance: none;
  width: 18px; height: 18px;
  border: 2px solid var(--border);
  border-radius: 4px;
  cursor: pointer;
  flex-shrink: 0;
  margin-top: 1px;
  position: relative;
  transition: all .2s;
}
.checklist-item input[type="checkbox"]:checked {
  background: var(--accent);
  border-color: var(--accent);
}
.checklist-item input[type="checkbox"]:checked::after {
  content: '✓';
  position: absolute;
  top: -1px; left: 2px;
  color: #fff;
  font-size: 12px;
  font-weight: 800;
}

/* ─── STAT MINI CARDS ─── */
.stat-row {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  margin: 16px 0;
}
.stat-mini {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 14px 12px;
  text-align: center;
}
.stat-mini-num {
  font-family: var(--mono);
  font-size: 20px;
  font-weight: 700;
  color: #f59e0b;
  line-height: 1.2;
}
.stat-mini-label {
  font-size: 11px;
  color: var(--text-muted);
  margin-top: 4px;
  line-height: 1.4;
}
.highlight-box {
  background: linear-gradient(135deg, rgba(245,158,11,.08), rgba(59,130,246,.08));
  border: 1px solid rgba(245,158,11,.2);
  border-radius: var(--radius);
  padding: 16px 20px;
  margin: 16px 0;
  display: flex;
  gap: 12px;
  align-items: flex-start;
}
.highlight-box .hl-icon {
  font-size: 20px;
  flex-shrink: 0;
  margin-top: 2px;
}
.highlight-box p {
  font-size: 14px;
  line-height: 1.6;
  color: var(--text);
}
.highlight-box strong { color: #f59e0b; }

/* ─── RESPONSIVE ─── */
@media (max-width: 640px) {
  .options-grid.cols-3 { grid-template-columns: 1fr; }
  .options-grid.cols-2 { grid-template-columns: 1fr; }
  .step-title { font-size: 22px; }
  .step-dots { gap: 4px; }
  .step-dot { width: 24px; height: 24px; font-size: 10px; }
  .modal { padding: 24px; }
  .stat-row { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<!-- Progress Bar -->
<div class="progress-bar-fixed"><div class="progress-bar-fill" id="progressFill"></div></div>

<!-- Top Nav -->
<nav class="top-nav">
  <div class="top-nav-brand">
    <span class="dot"></span>
    <span>DimMarEx · Лидоруб</span>
  </div>
  <div class="step-dots" id="stepDots"></div>
</nav>

<!-- Main Content -->
<main class="main" id="mainContent"></main>

<!-- Objections FAB -->
<div class="objections-fab">
  <div class="fab-label">Возражения</div>
  <button class="fab-btn" id="fabBtn" title="Возражения">
    <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H5.17L4 17.17V4h16v12zM11 5h2v5h-2zm0 7h2v2h-2z"/></svg>
  </button>
</div>

<!-- Objections Dropdown Menu -->
<div class="obj-menu" id="objMenu"></div>

<!-- Modal Overlay -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modalContent"></div>
</div>

<script>
// ─── DATA ───
const objections = [
  {
    title: '«Мне нужно подумать»',
    response: 'Конечно, это серьёзное решение. Именно поэтому предлагаю встречу — после неё у вас будет полная картина для размышлений. Так думать будет предметнее, согласны?'
  },
  {
    title: '«Отправьте на почту»',
    response: 'Обязательно отправлю! Но ключевые цифры и финмодель наш менеджер показывает на встрече в интерактивном формате — это гораздо нагляднее. Давайте назначим встречу, а материалы я пришлю дополнительно.'
  },
  {
    title: '«А это легально?»',
    response: 'Отличный вопрос! Юридическая модель — один из ключевых блоков нашей системы. На Zoom-встрече менеджер подробно разберёт правовую схему работы. Это абсолютно одна из наших сильных сторон.'
  },

// ─── STATE ───
const state = {
  current: 0,
  answers: {},   // crypto, timing, budget → green/yellow/red
  clientName: '',
  tg: ''
};

function isQualified() {
  const a = state.answers;
  let passes = 0;
  for (const key of ['crypto','timing','budget']) {
    if (a[key] === 'green' || a[key] === 'yellow') passes++;
  }
  return passes >= 2;
}

// ─── RENDER ───
function render() {
  const main = document.getElementById('mainContent');
  const step = steps[state.current];

  // Progress
  document.getElementById('progressFill').style.width =
    ((state.current / (steps.length - 1)) * 100) + '%';

  // Step dots
  const dotsEl = document.getElementById('stepDots');
  dotsEl.innerHTML = steps.map((s, i) => {
    let cls = 'step-dot';
    if (i === state.current) cls += ' active';
    else if (i < state.current) cls += ' done';
    return `<div class="${cls}" onclick="goToStep(${i})">${s.num}</div>`;
  }).join('');

  // Content
  let html = `<div class="step active">`;
  if (!step.isResult) {
    html += `<div class="step-header">
      <div class="step-number">Шаг ${step.num}</div>
      <div class="step-title">${step.title}</div>
    </div>`;
  }
  html += step.content();

  if (!step.isResult) {
    const canNext = canProceed();
    html += `<div class="step-nav">`;
    if (state.current > 0) {
      html += `<button class="btn btn-back" onclick="prevStep()">← Назад</button>`;
    }
    html += `<button class="btn btn-primary" id="nextBtn" ${canNext ? '' : 'disabled'} onclick="nextStep()">
      ${state.current === steps.length - 2 ? 'Завершить →' : 'Далее →'}
    </button>`;
    html += `</div>`;
  }

  html += `</div>`;
  main.innerHTML = html;
  window.scrollTo({ top: 0, behavior: 'smooth' });

  // restore selections
  if (step.qualification) {
    const val = state.answers[step.qualification];
    if (val) {
      const card = document.querySelector(`.option-card[data-q="${step.qualification}"][data-val="${val}"]`);
      if (card) card.classList.add('selected');
    }
  }
  if (step.id === 'greeting') {
    const inp = document.getElementById('nameInput');
    if (inp) inp.value = state.clientName;
  }
  if (step.id === 'zoom' || step.id === 'result') {
    const inp = document.getElementById('tgInput');
    if (inp) inp.value = state.tg;
  }
}

function canProceed() {
  const step = steps[state.current];
  if (step.id === 'greeting' && !state.clientName.trim()) return false;
  if (step.qualification && !state.answers[step.qualification]) return false;
  return true;
}

function selectOption(el) {
  const q = el.dataset.q;
  const val = el.dataset.val;
  // deselect siblings
  document.querySelectorAll(`.option-card[data-q="${q}"]`).forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
  state.answers[q] = val;
  document.getElementById('nextBtn').disabled = false;
}

function onNameInput() {
  const inp = document.getElementById('nameInput');
  if (inp) {
    state.clientName = inp.value;
    // Live-update the preview name
    const preview = document.querySelector('.client-name-preview');
    if (preview) preview.textContent = inp.value || '___';
    // Enable/disable next button
    const btn = document.getElementById('nextBtn');
    if (btn) btn.disabled = !canProceed();
  }
}

function onTgInput() {
  const inp = document.getElementById('tgInput');
  if (inp) state.tg = inp.value;
}

function nextStep() {
  if (!canProceed()) return;
  if (state.current < steps.length - 1) {
    state.current++;
    render();
  }
}

function prevStep() {
  if (state.current > 0) {
    state.current--;
    render();
  }
}

function goToStep(i) {
  if (i <= state.current) {
    state.current = i;
    render();
  }
}

function resetScript() {
  state.current = 0;
  state.answers = {};
  state.clientName = '';
  state.tg = '';
  render();
}

let objMenuOpen = false;

function buildObjMenu() {
  const menu = document.getElementById('objMenu');
  menu.innerHTML = objections.map((o, i) =>
    `<div class="obj-menu-item" onclick="openObjModal(${i})">${o.title}</div>`
  ).join('');
}

document.getElementById('fabBtn').addEventListener('click', () => {
  objMenuOpen = !objMenuOpen;
  document.getElementById('objMenu').classList.toggle('open', objMenuOpen);
});

function openObjModal(idx) {
  const o = objections[idx];
  objMenuOpen = false;
  document.getElementById('objMenu').classList.remove('open');
  const modal = document.getElementById('modalContent');
  modal.innerHTML = `
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-tag">Возражение</div>
    <h3>${o.title}</h3>
    <p>Клиент говорит это, чтобы уйти от решения. Ваша задача — перевести разговор обратно на встречу.</p>
    <div class="response-box">
      <p>${o.response}</p>
    </div>
  `;
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
}

document.getElementById('modalOverlay').addEventListener('click', (e) => {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
});

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    closeModal();
    objMenuOpen = false;
    document.getElementById('objMenu').classList.remove('open');
  }
});

// Close obj menu when clicking outside
document.addEventListener('click', (e) => {
  if (objMenuOpen && !e.target.closest('.objections-fab') && !e.target.closest('.obj-menu')) {
    objMenuOpen = false;
    document.getElementById('objMenu').classList.remove('open');
  }
});

// ─── INIT ───
buildObjMenu();
render();
</script>
</body>
</html>
